name: Windows CI

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "windows/**"
      - ".github/workflows/windows.yml"

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (WinUI 3 / .NET 8)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore IllUsionVPN.sln -p:Platform=x64

      - name: Build (Release x64)
        run: >
          dotnet build IllUsionVPN.sln
          -c Release
          -p:Platform=x64
          --no-restore
