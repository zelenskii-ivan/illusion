name: Windows CI

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "windows/**"
      - ".github/workflows/windows.yml"

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (WinUI 3 / .NET 8)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # WinUI 3 / MrtCore PRI-таргеты загружают .NET Framework MSBuild-таски,
      # поэтому собираем полноценным MSBuild.exe из Visual Studio, а не
      # `dotnet build` (coreclr MSBuild не может загрузить такие таски — MSB4062).
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          msbuild IllUsionVPN.sln -restore -m `
            -p:Configuration=Release -p:Platform=x64 *>&1 |
            Tee-Object -FilePath build.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Get-Content build.log |
              Select-String -Pattern '(: error |error CS|error MSB|error WMC|error XLS|error NU)' |
              Select-Object -Unique -First 40 |
              ForEach-Object { Write-Host ('::error::' + $_.Line.Trim()) }
          }
          exit $code

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: windows/build.log
          if-no-files-found: ignore
