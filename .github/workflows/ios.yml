name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - "apple/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "apple/**"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-14
    defaults:
      run:
        working-directory: apple
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print versions
        run: xcodebuild -version && swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select simulator
        run: |
          DEVICE=$(xcrun simctl list devices available \
            | grep -oE 'iPhone [0-9]+( Pro| Pro Max| Plus)?' \
            | sort -t' ' -k2 -n -r | head -n1)
          DEVICE=${DEVICE:-iPhone 15}
          echo "Using simulator: $DEVICE"
          echo "SIM_NAME=$DEVICE" >> "$GITHUB_ENV"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project IllUsionVPN.xcodeproj \
            -scheme IllUsionVPN \
            -destination "platform=iOS Simulator,name=${SIM_NAME}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apple/TestResults.xcresult
          if-no-files-found: ignore
