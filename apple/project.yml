name: IllUsionVPN
options:
  bundleIdPrefix: com.illusion.vpn
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true
  developmentLanguage: ru
  # objectVersion 56 → проект открывается в Xcode 14/15/16 (избегаем формата 77).
  objectVersion: 56

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # <- укажите ваш Team ID
  configs:
    Debug:
      ILLUSION_API_BASE_URL: "" # пусто → localhost:8787 (см. AppConfig)
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      ILLUSION_API_BASE_URL: "https://api.illusion.vpn"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule

# ВКЛЮЧЕНИЕ РЕАЛЬНОГО VPN-ТУННЕЛЯ:
# Пакет WireGuardKit нужен только таргету PacketTunnelProvider (реальное
# устройство + Team ID). По умолчанию он отключён, чтобы сборка приложения
# в симуляторе и CI не зависела от тяжёлого Go-тулчейна wireguard-apple.
# Раскомментируйте блок ниже вместе с таргетом PacketTunnelProvider и
# зависимостью на него в таргете IllUsionVPN.
#
# packages:
#   WireGuardKit:
#     url: https://github.com/WireGuard/wireguard-apple
#     branch: master

targets:
  IllUsionVPN:
    type: application
    platform: iOS
    sources:
      - path: IllUsionVPN
        excludes:
          - "*.entitlements"
      - path: Shared
    info:
      path: IllUsionVPN/Info.plist
      properties:
        CFBundleDisplayName: IllUsion
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Динамический адрес API (значение задаётся per-config в settings).
        IllUsionAPIBaseURL: $(ILLUSION_API_BASE_URL)
        # Доступ к локальной сети для ping-замера задержки до серверов.
        NSLocalNetworkUsageDescription: "Используется для измерения задержки до VPN-серверов."
        # ATS: прод-трафик только по HTTPS, localhost для отладки разрешён.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: IllUsionVPN/IllUsionVPN.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.illusion.vpn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.illusion.vpn
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: IllUsionWidgetExtension
    # ВКЛЮЧЕНИЕ РЕАЛЬНОГО VPN-ТУННЕЛЯ:
    # Раскомментируйте зависимость ниже, чтобы встроить расширение
    # PacketTunnelProvider (нужно реальное устройство + Team ID).
    # По умолчанию приложение запускается в демо-режиме (симулятор),
    # где UI работает полностью, а подключение имитируется.
    #
    #   - target: PacketTunnelProvider

  # macOS-версия приложения. Переиспользует тот же код, что и iOS.
  # Папка Shared (Live Activity / ActivityKit) исключена — ActivityKit на
  # macOS недоступен, а соответствующий код в приложении обёрнут в #if os(iOS).
  IllUsionVPNMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: IllUsionVPN
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: IllUsionVPNMac-Info.plist
      properties:
        CFBundleDisplayName: IllUsion
        LSApplicationCategoryType: public.app-category.utilities
        IllUsionAPIBaseURL: $(ILLUSION_API_BASE_URL)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: IllUsionVPN/IllUsionVPNMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.illusion.vpn
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # PacketTunnelProvider — таргет реального WireGuard-туннеля. Отключён по
  # умолчанию (требует WireGuardKit + реальное устройство). Чтобы включить:
  # 1) раскомментируйте блок `packages: WireGuardKit` выше;
  # 2) раскомментируйте этот таргет;
  # 3) раскомментируйте зависимость `- target: PacketTunnelProvider` в IllUsionVPN.
  #
  # PacketTunnelProvider:
  #   type: app-extension
  #   platform: iOS
  #   sources:
  #     - path: PacketTunnelProvider
  #   info:
  #     path: PacketTunnelProvider/Info.plist
  #     properties:
  #       NSExtension:
  #         NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
  #         NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
  #   entitlements:
  #     path: PacketTunnelProvider/PacketTunnelProvider.entitlements
  #     properties:
  #       com.apple.developer.networking.networkextension:
  #         - packet-tunnel-provider
  #       com.apple.security.application-groups:
  #         - group.com.illusion.vpn
  #   settings:
  #     base:
  #       PRODUCT_BUNDLE_IDENTIFIER: com.illusion.vpn.PacketTunnel
  #   dependencies:
  #     - package: WireGuardKit

  IllUsionWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: IllUsionWidget
      - path: Shared
    info:
      path: IllUsionWidget/Info.plist
      properties:
        CFBundleDisplayName: IllUsion
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.illusion.vpn.Widget

  IllUsionVPNTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IllUsionVPNTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.illusion.vpn.tests
    dependencies:
      - target: IllUsionVPN

schemes:
  IllUsionVPN:
    build:
      targets:
        IllUsionVPN: all
    run:
      config: Debug
      # Локальное тестирование подписок без App Store Connect.
      storeKitConfiguration: IllUsionVPN/Resources/Products.storekit
    test:
      config: Debug
      targets:
        - IllUsionVPNTests
    archive:
      config: Release

  IllUsionVPNMac:
    build:
      targets:
        IllUsionVPNMac: all
    run:
      config: Debug
      storeKitConfiguration: IllUsionVPN/Resources/Products.storekit
    archive:
      config: Release
